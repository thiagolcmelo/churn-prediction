global:
  scrape_interval: 5s      # How often Prometheus pulls metrics from targets
  evaluation_interval: 5s  # How often it evaluates alerting rules

scrape_configs:
  - job_name: "churn-api"
    static_configs:
      - targets: ["churn-api:8000"]  # Docker Compose service name + port
    metrics_path: "/metrics"         # The endpoint Prometheus scrapes